<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estação Meteorológica</title>
    <!-- Linha abaixo evita o erro de favicon no console -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Previsão do Tempo</h1>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Digite a cidade...">
            <button id="search-btn">Buscar</button>
            <button id="geo-btn" title="Minha Localização">📍</button>
        </div>

        <div id="weather-card" class="weather-card hidden">
            <h2 id="city-name">---</h2>
            <div class="temp-container">
                <img id="weather-icon" src="" alt="Clima">
                <p id="temperature">--°C</p>
            </div>
            <p id="description">---</p>
        </div>

        <div id="error-message" class="error-message hidden">
            Cidade não encontrada ou GPS negado.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
